<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #smooth-wrapper{
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;

        }
        #smooth-content{
            /* will-change: transform; */
            min-height: 200vh;
        }

        .section{
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
        }

        .sec1{
            background-color: aqua;
        }
        .sec2{
            background-color: aquamarine;
        }
        .sec3{
            background-color: orange;
        }

        .box{
            width: 150px;
            height: 150px;
            background-color: #aaa;
        }
    </style>
</head>
<body>
    <div id="smooth-wrapper">
        <div id="smooth-content">
            
            <section class="sec1 section">
                <div>Scroll Down</div>
            </section>
            <section class="sec2 section">
                <div class="box"></div>
            </section>
            <section class="sec3 section">
                <div>End</div>
            </section>

        </div>
    </div>
    
<script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
<!-- ScrollSmoother requires ScrollTrigger -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollSmoother.min.js"></script>
<script>
 // use a script tag or an external JS file
  gsap.registerPlugin(ScrollTrigger,ScrollSmoother);
  // gsap code here!
  const smoother = ScrollSmoother.create({
    wrapper : "#smooth-wrapper",
    content : "#smooth-content",
    smooth : 1.5,
    effects : true
  });

//   기본 scrollTrigger 애니메이션

gsap.to(".box",{
    x: 300,
    rotation: 360,
    duration: 2,

    scrollTrigger : {
        trigger : ".sec2",
        start : "top center",
        end : "bottom center",
        scrub : true,
        markers : true
    }
});


// parallax 효과

/*
data-speed 속성:
1 = 기본속도
0.5 = 느리게 (뒤에 있는 느낌)
2 = 빠르게 (앞에 있는 느낌)
*/

gsap.utils.toArray(".section").forEach(section => {
    section.setAttribute("data-speed","0.9")
});

/*
✔ ScrollSmoother 사용할 때 주의사항

1. body에 overflow: hidden 넣지 말 것
2. wrapper는 반드시 fixed 구조
3. ScrollTrigger는 항상 registerPlugin 이후 사용
4. height는 content 기준으로 잡힘

✔ ScrollSmoother가 안될 때 체크
- CDN 순서 틀림
- wrapper/content 구조 틀림
- position fixed 빠짐
*/


</script>
</body>
</html>
