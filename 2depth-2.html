<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://kit.fontawesome.com/f43f178ff0.js" crossorigin="anonymous" async></script>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        li{
            list-style: none;
        }

        a{
            display: block;
            text-decoration: none;
            color: inherit;
            padding: 10px;
        }
        
        header{
            background-color: antiquewhite;
        }

        .menu{
            display: flex;
            justify-content: center;
            gap: 40px;
            text-align: center;
        }

        .menu > li{
            position: relative;
        }

        .sub{
            position: absolute;
            top:100%;
            left: 0;
            display: none;
            background-color: aquamarine;
        }

        .menu-btn{
            display: none;
            padding: 10px;
            cursor: pointer;
        }

        @media(max-width:768px){
            .menu-btn{
                display: block;
            }
            .menu{
                display: none;
                flex-direction: column;
                
            }
            .menu.active{
                display: flex;
            }
            .sub{
                position: static;
            }
        }

    </style>
</head>

<body>
    <header class="header">
    <div class="menu-btn">
        <i class="fa-solid fa-bars mo-navi"></i>
    </div>
    <ul class="menu">
        <li>
            <a href="#">매뉴</a>
            <ul class="sub">
                <li><a href="#">서브1</a></li>
                <li><a href="#">서브2</a></li>
            </ul>
        </li>
        <li>
            <a href="#">매뉴</a>
            <ul class="sub">
                <li><a href="#">서브1</a></li>
                <li><a href="#">서브2</a></li>
            </ul>
        </li>
        <li>
            <a href="#">매뉴</a>
            <ul class="sub">
                <li><a href="#">서브1</a></li>
                <li><a href="#">서브2</a></li>
            </ul>
        </li>
    </ul>
    </header>
    <script src="js/libs/jquery.min.js"></script>
    <script>
        $(".menu > li").hover(function(){
            if(window.innerWidth > 768){
            $(this).find(".sub").stop().slideDown();
            }
        }, function(){
            if(window.innerWidth > 768){
            $(this).find(".sub").stop().slideUp();
            }
        })

        // 모바일 메뉴

        $(".menu-btn").click(function(){
            $(".menu").toggleClass("active")
        })

        // 모바일 아코디언

        $(".menu > li > a").click(function(e){
            e.preventDefault();

            let sub = $(this).next(".sub");
            $(".sub").not(sub).slideUp();
            sub.slideToggle();
        })
    </script>
</body>

</html>
