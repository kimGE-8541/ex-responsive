<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>자바스크립트 if 문</h1>
    <p>만약에 비가오면 우산을 쓴다</p>
    <code>
        if(조건){<br>
            실행할 코드 <br>
        }
    </code>
    <p class="text"></p>

    <script>
        let age = prompt("나이를입력해");
        if(age<=19){
            document.querySelector('.text').innerHTML="890원"
        } else if(age>=65){
            document.querySelector('.text').innerHTML="무료"
        } else{
            document.querySelector('.text').innerHTML="1200원"
        }
    </script>
    
</body>
</html>
