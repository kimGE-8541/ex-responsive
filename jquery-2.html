<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box-1{
            width: 100px;
            height: 100px;
            background-color: aqua;
            position: relative;
        }

        .box-a{
            width: 100px;
            height: 100px;
            background-color: black;
            position: relative;            
        }

        .box-2{
            width: 100px;
            height: 100px;
            background-color: red;
            position: relative;            
        }
    </style>
</head>
<body>
    <p class="text1">작동을 하게 하는 방법</p>
    <button class="hide-btn">hide</button>
    <button class="show-btn">show</button>
    <button class="toggle-btn">toggle</button>
    <hr>
    <p class="text2">완전 애니메이션</p>
    <button class="fade-in">fade in</button>
    <button class="fade-out">fade out</button>
    <button class="fade-toggle">fade toggle</button>
    <hr>
    <p class="text3">슬ㄹ라이잉이이ㅣ잉</p>
    <button class="slide-down">down</button>
    <button class="slide-up">up</button>
    <button class="slide-toggle">toggle</button>
    <hr>
    <button class="ani-btn">움직인딘</button>
    <div class="box-1"></div>
    <div class="box-a"></div>
    <hr>
    <button class="mot-btn">모션</button>
    <div class="box-2">글자</div>

    <script src="js/libs/jquery.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
