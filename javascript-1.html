<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="box">
    <h1>자바스크립트란?</h1>
    <p>동적 움직임을 만들 때 쓰는 겁니다.</p>
    <p>자바스크립트는 화면의 모든 움직임을 담당합니다.</p>
    <p>자바스크립트는 대부분 /body 태그 위에 코드를 작성합니다.</p>
    </div>


    <button class="btn">
        이게클릭이라는거야
    </button>
    <script>

        document.write("안녕하세요!")

        let name = "홍길동"

        document.write(name+"님")

        let num1 = 30;
        let num2 = 10;

        document.write(num1+num2);
        // + - * / 사용 가능

        //변수
        // 변수는 let const 두가지가 있다.
        // 예전 변수명은 var 라고 했다.
        const btn = document.querySelector(".btn");
        const box = document.querySelector(".box");

        btn. addEventListener("click",function(){
            box.style.backgroundColor = "red"
        })


    </script>
    
</body>
</html>
