<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }

        a{
            text-decoration: none;
            color: inherit;
        }

        li{
            list-style: none;
        }

        header{
            background-color: aqua;
        }

        header ul{
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }

        .mo-navi{
            display: none;
        }

        @media(max-width:768px){


            header ul{
                flex-direction: column;
                background-color: bisque;
                position: absolute;
                width: 50%;
                z-index: 99;
                top: 0;
                height: 100%;
                left: -50%;
                transition: all 0.5s;
            }

            header li{
                margin: 20px 0;
            }

            .mo-navi{
                display: block;
                display: flex;
                justify-content: flex-end;
                cursor: pointer;

            }

            .mo-navi img{
                width: 60px;
                margin-right: 30px;
            }

            .block{
                display: flex;
                left: 0;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="mo-navi">
            <img src="icon1.png" alt="">
        </div>
        <ul>
            <li><a href="#">1</a></li>
            <li><a href="#">2</a></li>
            <li><a href="#">3</a></li>
            <li><a href="#">4</a></li>
            <li><a href="#">5</a></li>
        </ul>

    </header>

    <script src="js/libs/jquery.min.js"></script>
    <script>
        $(".mo-navi").click(function(){
            $("header ul").toggleClass("block");
        })
    </script>
</body>
</html>
