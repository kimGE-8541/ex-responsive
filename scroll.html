<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .scroll-wrapper {
            overflow: hidden;
        }

        .horizontal-section {
            display: flex;
            width: 100%;
            max-width: 1440px;
            height: 100%;
            /* 화면 꽉 차게 */
            position: relative;
            margin: auto;
        }

        .left-side {
            width: 50%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .text-item {
            position: absolute;
            /* 텍스트들을 한곳에 겹쳐둠 */
            opacity: 0;
            /* 처음엔 안 보이게 */
            text-align: center;
        }

        .text-item.active {
            opacity: 1;
        }

        .right-side {
            width: 50%;
            height: 100vh;
            overflow: hidden;
            /* 넘치는 이미지는 숨김 */
        }

        .image-container {
            display: flex;
            flex-direction: column;
            /* 이미지를 세로로 나열 */
        }

        .image-container img {
            width: 100%;
            height: 100vh;
            /* 이미지 하나가 화면 꽉 차게 */
            object-fit: cover;
        }
    </style>
</head>

<body>
    <div class="scroll-wrapper">
        <!-- 전체 섹션을 고정시킬 큰 컨테이너 -->
        <div class="horizontal-section">

            <!-- 왼쪽: 텍스트 영역 (고정된 자리에서 내용만 바뀜) -->
            <div class="left-side">
                <div class="text-item active">
                    <h1>첫 번째 이야기</h1>
                    <p>내용이 들어갑니다.</p>
                </div>
                <div class="text-item">
                    <h1>두 번째 이야기</h1>
                    <p>내용이 들어갑니다.</p>
                </div>
                <div class="text-item">
                    <h1>세 번째 이야기</h1>
                    <p>내용이 들어갑니다.</p>
                </div>
            </div>

            <!-- 오른쪽: 이미지 영역 (길게 연결되어 위로 올라감) -->
            <div class="right-side">
                <div class="image-container">
                    <img src="images/bg-1.jpg" alt="1">
                    <img src="images/bg-2.jpg" alt="2">
                    <img src="images/bg-3.jpg" alt="3">
                </div>
            </div>

        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
    <script>
        gsap.registerPlugin(ScrollTrigger);

        const imageContainer = document.querySelector(".image-container");
        const textItems = document.querySelectorAll(".text-item");
        const numItems = textItems.length;

        // 1. 메인 타임라인 생성 (스크롤에 고정됨)
        let mainTl = gsap.timeline({
            scrollTrigger: {
                trigger: ".horizontal-section",
                start: "top top",
                end: "+=3000", // 스크롤 길이를 충분히 길게!
                pin: true,     // 화면 고정
                scrub: 1,      // 스크롤과 동기화
                markers: true  // [중요] 디버깅용! 잘 움직이는지 눈으로 확인하세요.
            }
        });

        // 2. 이미지 뭉치 이동 애니메이션 (사진이 주르륵 올라가는 부분)
        // 3장이라면 -66.6%까지 이동해야 3번 사진이 보입니다.
        mainTl.to(imageContainer, {
            yPercent: -66.6, // (이미지 개수에 맞춰 자동 계산)
            duration: 10,
            ease: "none"
        }, 0); // 0초 지점(시작점)에서 실행

        // 3. 텍스트 교체 애니메이션 (사진 위치에 맞춰서!)
        textItems.forEach((text, i) => {
            if (i > 0) {
                // 텍스트가 바뀌는 타이밍을 10(duration) 사이의 적절한 곳에 배치
                // 이미지 3장일 때: i가 1일 때(약 5초 지점), i가 2일 때(약 10초 지점)
                let startTime = (i / (numItems - 1)) * 10;

                // 이전 글자 사라지기
                mainTl.to(textItems[i - 1], {
                    opacity: 0,
                    y: -20,
                    duration: 1 // 부드럽게 사라지는 시간
                }, startTime - 3); // 이미지 도착 1초 전부터 시작

                // 새 글자 나타나기
                mainTl.to(text, {
                    opacity: 1,
                    y: 0,
                    duration: 1 // 부드럽게 나타나는 시간
                }, startTime - 3);
            }
        });
    </script>
</body>

</html>
