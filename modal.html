<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{margin: 0;padding: 0;}

        .popup {
            width: 30%;
            background-color: rebeccapurple;
            color: white;
            height: 300px;
        }

        .popup-bg{
            background-color: rgb(0, 0, 0,.5);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0;
            left: 0;
        }


        .popup-title a{
            position: relative;
            color: black;
            background-color: white;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 100px;
            right: -93%;
            top: -10px;
        }


    </style>

</head>

<body>
    <button class="event-btn">이벤트확인해주새요</button>


    <div class="popup-bg">
        <div class="popup">
            <div class="popup-title">
                <span><a href="#">X</a></span>
            </div>
            <div class="popup-body">
                <h3>이벤트 당청 되엇어요</h3>
            </div>
        </div>
    </div>

    <script src="js/libs/jquery.min.js"></script>
    <script>
        $(".popup-title a").click(function(){
            $(".popup-bg").fadeOut();
        })
        $(".event-btn").click(function(){
            $(".popup-bg").fadeIn();
        })
    </script>
</body>

</html>
